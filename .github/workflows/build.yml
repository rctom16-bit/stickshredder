name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build StickShredder
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build executable
        run: pyinstaller stickshredder.spec

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/stickshredder.iss

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: StickShredder-portable
          path: dist/StickShredder.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: StickShredder-installer
          path: Output/StickShredder-*-Setup.exe

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/StickShredder-portable/StickShredder.exe
            artifacts/StickShredder-installer/StickShredder-*-Setup.exe
